name: CI

on:
  push:
    branches: [main, pivot]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -timeout=60s ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Don't fail CI on lint issues yet — we're early in the rewrite.
          # Flip this to false once the codebase stabilises.
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build VERSION=ci-${{ github.sha }}

      - name: Smoke test — version flag
        run: |
          BUILT_VERSION=$(./build/vibrate --version | head -1)
          echo "Built version: $BUILT_VERSION"
          echo "$BUILT_VERSION" | grep -q "ci-${{ github.sha }}"

      - name: Smoke test — help works
        run: ./build/vibrate --help > /dev/null

      - name: Smoke test — runtime detect runs (no daemon expected in CI)
        run: |
          # No docker daemon in CI runner. Tool should exit non-zero with a
          # clear "no docker runtime detected" message rather than panicking.
          set +e
          OUTPUT=$(./build/vibrate runtime detect 2>&1)
          RC=$?
          set -e
          echo "Exit code: $RC"
          echo "Output: $OUTPUT"
          test $RC -ne 0
          echo "$OUTPUT" | grep -qi "no docker runtime"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibrate-${{ github.sha }}
          path: build/vibrate
          retention-days: 7
