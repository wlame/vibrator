name: CI

on:
  push:
    branches: [main, pivot]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: just vet
        run: just vet

      - name: just test
        run: just test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # v9 requires golangci-lint v2; latest is built with a current Go
          # toolchain (v1's last release was built with go1.24, which refuses
          # to run against this module's `go 1.26.2` directive). Config +
          # timeout live in .golangci.yml.
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Build
        env:
          VERSION: ci-${{ github.sha }}
        run: just build

      - name: Smoke test — version flag
        run: |
          BUILT_VERSION=$(./build/vibrate --version | head -1)
          echo "Built version: $BUILT_VERSION"
          echo "$BUILT_VERSION" | grep -q "ci-${{ github.sha }}"

      - name: Smoke test — help works
        run: ./build/vibrate --help > /dev/null

      - name: Smoke test — runtime detect runs without panicking
        run: |
          # GitHub-hosted runners ship a Docker daemon, so `runtime detect` may
          # legitimately succeed (e.g. "Runtime: native") OR report no runtime —
          # both are valid. What we actually guard against is a crash: the tool
          # must print sensible output and never panic.
          set +e
          OUTPUT=$(./build/vibrate runtime detect 2>&1)
          RC=$?
          set -e
          echo "Exit code: $RC"
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qiE "runtime:|no docker runtime"
          if echo "$OUTPUT" | grep -qi "panic:"; then
            echo "vibrate runtime detect panicked"; exit 1
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibrate-${{ github.sha }}
          path: build/vibrate
          retention-days: 7
