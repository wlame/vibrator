name: Docs

# Builds the MkDocs (Material) documentation site from docs/ + mkdocs.yml and
# publishes it to the `gh-pages` branch, which GitHub Pages serves.
#
# Runs on pushes to main that touch the docs, and can be triggered manually
# from the Actions tab (workflow_dispatch).
#
# REQUIRED one-time setup in the repo (do it by hand once):
#   Settings → Pages → Build and deployment → Source = "Deploy from a branch"
#   → Branch = "gh-pages" / "(root)".
# The first run below creates the gh-pages branch; after you point Pages at it,
# every subsequent run republishes with no further configuration. The site is
# served at https://wlame.github.io/vibrator/.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs-requirements.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# gh-deploy force-pushes the built site to the gh-pages branch, so the workflow
# needs write access to repository contents.
permissions:
  contents: write

# Allow only one concurrent publish; don't cancel an in-progress run so a
# deploy always finishes cleanly.
concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives gh-deploy the full history it needs to update the
      # gh-pages branch in place.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # uv is the project's Python package manager (pip is not used).
      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install docs dependencies
        run: uv pip install --system -r docs-requirements.txt

      # gh-deploy builds the site and force-pushes it to the gh-pages branch.
      # --strict aborts on broken internal links or pages missing from the nav,
      # so a bad merge can't silently publish a broken site.
      - name: Build & deploy to gh-pages
        run: mkdocs gh-deploy --force --strict
