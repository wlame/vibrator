<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Vibrator logo">
  <!-- Isometric cube: an isolated container per workspace. White for the colored header bar. -->
  <g stroke="#ffffff" stroke-width="2.1" stroke-linejoin="round" stroke-linecap="round">
    <!-- top face -->
    <path d="M24 7 L38 15 L24 23 L10 15 Z" fill="#ffffff" fill-opacity="0.18"/>
    <!-- left face -->
    <path d="M10 15 L24 23 L24 39 L10 31 Z" fill="#ffffff" fill-opacity="0.08"/>
    <!-- right face -->
    <path d="M38 15 L24 23 L24 39 L38 31 Z" fill="#ffffff" fill-opacity="0.13"/>
  </g>
  <!-- "vibrate" motion ticks -->
  <g stroke="#ffffff" stroke-width="2.1" stroke-linecap="round" opacity="0.9">
    <path d="M3 21 L6 21"/>
    <path d="M2.5 25.5 L6.5 25.5"/>
    <path d="M3 30 L6 30"/>
  </g>
</svg>
